<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidación Envía Colvanes - Colombia</title>
    <style>
        :root {
            --envia-red: #e30613;
            --wa-green: #25d366;
            --dark: #1a1a1a;
            --light-bg: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light-bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid var(--envia-red);
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: var(--envia-red); margin: 0; font-size: 26px; font-weight: 900; }
        .header p { font-size: 12px; color: #666; margin-top: 5px; font-weight: bold; }

        .label-main { display: block; font-size: 13px; font-weight: 800; color: #444; margin: 15px 0 5px; text-transform: uppercase; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #edf0f2;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--envia-red); outline: none; background: #fffafa; }

        /* Estilo para las unidades dinámicas */
        .box-unit {
            background: #fdfdfd;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 15px;
            margin-top: 10px;
            border-left: 4px solid var(--envia-red);
        }

        .unit-title { font-size: 11px; font-weight: 900; color: var(--envia-red); margin-bottom: 8px; }

        .grid-specs {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr;
            gap: 8px;
        }

        .grid-specs label { font-size: 9px; color: #999; font-weight: bold; display: block; margin-bottom: 2px; }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 15px rgba(37, 211, 102, 0.2);
        }

        .btn-whatsapp:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <label class="label-main">🔢 Cantidad de Unidades</label>

    <div id="listaUnidades">
        </div>

    <label class="label-main">💰 Valor Declarado ($)</label>

    <label class="label-main">💳 Tipo de Envío</label>
    <select id="pago">

        <option value="Contra Entrega">Contra Entrega (Destinatario)</option>
        <option value="Crédito">Crédito (Empresarial)</option>
    </select>

    <button class="btn-whatsapp" onclick="enviar()">
        SOLICITAR LIQUIDACIÓN ➔
    </button>
</div>

    const dl = document.getElementById('colombia');
    municipiosExtra.forEach(m => {
        const op = document.createElement('option');
        op.value = m;
        dl.appendChild(op);
    });

    function crearCajas() {
        const n = document.getElementById('cantidad').value;
        const lista = document.getElementById('listaUnidades');
        lista.innerHTML = '';
        
        if (n > 15) return alert("Máximo 15 unidades");

        for (let i = 1; i <= n; i++) {
            const item = document.createElement('div');
            item.className = 'box-unit';
            item.innerHTML = `
                <div class="unit-title">PAQUETE / UNIDAD #${i}</div>
                <div class="grid-specs">
                    <div><label>PESO (KG)</label><input type="number" class="u-p" placeholder="0"></div>
                    <div><label>LARGO (cm)</label><input type="number" class="u-l" placeholder="0"></div>
                    <div><label>ANCHO (cm)</label><input type="number" class="u-a" placeholder="0"></div>
                    <div><label>ALTO (cm)</label><input type="number" class="u-h" placeholder="0"></div>
                </div>
            `;
            lista.appendChild(item);
        }
    }

    function enviar() {
        const dest = document.getElementById('destino').value;
        const cant = document.getElementById('cantidad').value;
        const val = document.getElementById('valor').value;
        const pago = document.getElementById('pago').value;

        if (!dest || !cant) return alert("Falta destino o cantidad");

        let specs = "";
        const ps = document.querySelectorAll('.u-p');
        const ls = document.querySelectorAll('.u-l');
        const as = document.querySelectorAll('.u-a');
        const hs = document.querySelectorAll('.u-h');

        ps.forEach((p, index) => {
            specs += `📦 *Unidad ${index + 1}:* ${p.value}Kg (${ls[index].value}x${as[index].value}x${hs[index].value}cm)%0A`;
        });

        const msn = 
            `*📋 SOLICITUD DE LIQUIDACIÓN*%0A` +
            `*Envía Colvanes*%0A%0A` +
            `*📍 DESTINO:* ${dest}%0A` +
            `*🔢 TOTAL UNIDADES:* ${cant}%0A%0A` +
            `*DETALLE DE CARGA:*%0A${specs}%0A` +
            `*🛡️ VALOR DECLARADO:* $${parseFloat(val).toLocaleString('es-CO')}%0A` +
            `*💳 FORMA DE PAGO:* ${pago}%0A%0A` +
            `*━━━━━━━━━━━━━━━━━━*%0A` +
            `Favor liquidar para proceder con el despacho.`;

        window.open(`https://wa.me/?text=${msn}`, '_blank');
    }
